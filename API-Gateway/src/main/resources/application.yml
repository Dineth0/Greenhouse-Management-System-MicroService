server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: inventory-route
              uri: lb://user-service
              predicates:
                - Path=/api/v1/user/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/