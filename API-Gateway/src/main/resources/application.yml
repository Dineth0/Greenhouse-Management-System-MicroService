server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-route
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**

            - id: zone-management-route
              uri: lb://zone-management-service
              predicates:
                - Path=/api/zones/**

            - id: sensor-telemetry-service
              uri: lb://sensor-telemetry-service
              predicates:
                - Path=/api/sensors/**

            - id: automation-route
              uri: lb://automation-control-service
              predicates:
                - Path=/api/automation/**

            - id: crop-route
              uri: lb://crop-inventory-service
              predicates:
                - Path=/api/crop/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/