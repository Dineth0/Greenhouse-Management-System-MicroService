server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-route
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**

            - id: zone-management-route
              uri: lb://zone-management-service
              predicates:
                - Path=/api/zone/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/